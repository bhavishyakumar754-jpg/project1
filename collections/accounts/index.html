<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Account — KIWAD</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf8f4;
      --card: #ffffff;
      --ink: #1a1917;
      --muted: #6f6962;
      --soft: #f2ede6;
      --line: #e4ddd3;
      --gold: #b8964e;
      --danger: #c0392b;
      --success: #2d6a4f;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    .account-nav {
      height: 68px;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(250,248,244,0.94);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .account-nav a {
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s;
    }

    .account-nav a:hover,
    .account-nav a.active { color: var(--ink); }

    .account-nav-logo {
      display: inline-flex;
      align-items: center;
    }

    .account-nav-logo img {
      height: 50px;
      width: auto;
      display: block;
    }

    .account-nav-links {
      display: flex;
      align-items: center;
      gap: 1.4rem;
    }

    .account-search {
      display: inline-flex;
      align-items: center;
      min-width: 160px;
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.7);
      transition: border-color 0.22s ease, box-shadow 0.22s ease, background 0.22s ease, transform 0.22s ease;
    }

    .account-search:hover,
    .account-search:focus-within {
      border-color: rgba(184,150,78,0.72);
      background: rgba(255,255,255,0.94);
      box-shadow: 0 0 0 2px rgba(184,150,78,0.16), 0 8px 22px rgba(26,25,23,0.07);
      transform: translateY(-1px);
    }

    .account-search input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font-family: 'Sora', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .account-search input::placeholder {
      color: #a7a19a;
    }

    .account-shell {
      min-height: calc(100vh - 68px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 18px 50px rgba(26,25,23,0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      margin-bottom: 2rem;
    }

    .brand-logo-image {
      display: block;
      height: 72px;
      width: auto;
    }

    h2 {
      font-size: 22px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 1.75rem;
    }

    .msg {
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
    }

    .msg.error  { background: #fef2f2; color: var(--danger); display: block; }
    .msg.success { background: #f0fdf4; color: var(--success); display: block; }

    .field { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .input-wrap { position: relative; }

    .input-wrap input {
      width: 100%;
      padding: 10px 40px 10px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Sora', sans-serif;
      background: var(--soft);
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap input:focus {
      border-color: var(--gold);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(184,150,78,0.14);
    }

    .input-wrap input::placeholder { color: #a7a19a; }

    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #a7a19a;
      display: flex;
      align-items: center;
      padding: 2px;
    }

    .eye-btn:hover { color: var(--muted); }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      margin-top: 4px;
    }

    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
    }

    .checkbox-wrap input[type="checkbox"] {
      accent-color: var(--gold);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .checkbox-wrap span { font-size: 13px; color: var(--muted); }

    .forgot {
      font-size: 13px;
      color: var(--ink);
      text-decoration: none;
      font-weight: 500;
    }

    .forgot:hover { text-decoration: underline; }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Sora', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.2px;
      margin-bottom: 1.25rem;
    }

    .btn-login:hover { background: #34302b; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { background: #a7a19a; cursor: not-allowed; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.25rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .divider span { font-size: 12px; color: #a7a19a; white-space: nowrap; }

    .btn-google {
      width: 100%;
      padding: 10px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Sora', sans-serif;
      color: var(--ink);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
      margin-bottom: 1.5rem;
    }

    .btn-google:hover { background: var(--soft); }

    .signup-row {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    .signup-row a {
      color: var(--ink);
      font-weight: 500;
      text-decoration: none;
    }

    .signup-row a:hover { text-decoration: underline; }

    @media (max-width: 560px) {
      .account-nav {
        height: auto;
        min-height: 72px;
        align-items: flex-start;
        flex-direction: column;
        gap: 12px;
        padding: 12px 1rem 16px;
      }

      .account-nav-links {
        width: 100%;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
      }

      .account-nav a {
        font-size: 10px;
        letter-spacing: 0.12em;
      }

      .account-shell {
        min-height: auto;
        padding: 2rem 1rem 3rem;
      }

      .account-search {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <header class="account-nav">
    <a href="../../" class="account-nav-logo" aria-label="KIWAD home">
      <img src="../../assets/kiwadv3 (3).png" alt="KIWAD"/>
    </a>
    <div class="account-nav-links">
      <form class="account-search" action="search/" method="get" role="search">
        <input type="search" name="q" placeholder="Search" autocomplete="off">
      </form>
      <a href="../cart/">Cart</a>
      <a href="./" class="active">Account</a>
    </div>
  </header>

  <main class="account-shell">
  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <img src="../../assets/kiwadv3 (3).png" alt="KIWAD" class="brand-logo-image">
    </div>

    <h2>Welcome back</h2>
    <p class="sub">Sign in to view orders, saved pieces, and checkout faster.</p>

    <!-- Message box -->
    <div class="msg" id="msg"></div>

    <!-- Email -->
    <div class="field">
      <label for="email">Email</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
    </div>

    <!-- Password -->
    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
        <button class="eye-btn" id="eye" type="button" title="Toggle password visibility">
          <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Remember me + Forgot -->
    <div class="row">
      <label class="checkbox-wrap">
        <input type="checkbox" id="remember"/>
        <span>Remember me</span>
      </label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <!-- Login button -->
    <button class="btn-login" id="loginBtn">Sign in</button>

    <!-- Divider -->
    <div class="divider"><span>or continue with</span></div>

    <!-- Google -->
    <button class="btn-google" id="googleBtn">
      <svg width="16" height="16" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <!-- Sign up -->
    <div class="signup-row">
      Don't have an account? <a href="#">Create one</a>
    </div>

  </div>
  </main>

  <script>
    const emailEl   = document.getElementById('email');
    const passEl    = document.getElementById('password');
    const msgEl     = document.getElementById('msg');
    const loginBtn  = document.getElementById('loginBtn');
    const eyeBtn    = document.getElementById('eye');
    const eyeIcon   = document.getElementById('eye-icon');

    // Toggle password visibility
    eyeBtn.addEventListener('click', () => {
      const isHidden = passEl.type === 'password';
      passEl.type = isHidden ? 'text' : 'password';
      eyeIcon.innerHTML = isHidden
        ? `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
           <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
           <circle cx="12" cy="12" r="3"/>`;
    });

    // Show message
    function showMsg(text, type) {
      msgEl.textContent = text;
      msgEl.className = 'msg ' + type;
    }

    // Validate fields
    function validate() {
      const email = emailEl.value.trim();
      const pass  = passEl.value;

      if (!email) {
        showMsg('Please enter your email address.', 'error');
        return false;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showMsg('Please enter a valid email address.', 'error');
        return false;
      }
      if (!pass) {
        showMsg('Please enter your password.', 'error');
        return false;
      }
      if (pass.length < 6) {
        showMsg('Password must be at least 6 characters.', 'error');
        return false;
      }
      return true;
    }

    // Login button click
    loginBtn.addEventListener('click', () => {
      msgEl.className = 'msg'; // reset
      if (!validate()) return;

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';

      // Simulate API call
      setTimeout(() => {
        showMsg('Signed in successfully! Redirecting...', 'success');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign in';
      }, 1500);
    });

    // Google button
    document.getElementById('googleBtn').addEventListener('click', () => {
      showMsg('Google sign-in would open here.', 'success');
    });

    // Enter key to submit
    [emailEl, passEl].forEach(el => {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter') loginBtn.click();
      });
    });
  </script>

</body>
</html>
