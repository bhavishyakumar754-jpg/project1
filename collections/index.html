<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collection — VELL</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style2.css" />
</head>

<body>
  <div class="cursor" id="cursor"></div>

  <!-- NAV -->
  <nav id="nav">
    <a href="#" class="nav-logo"><img src="../assets/kiwadv3 (3).png" alt="KIWAD" class="brand-logo-image" /></a>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="nav-mobile-panel"
      aria-label="Toggle navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul class="nav-links">
      <li><a href="#" class="active">Collection</a></li>
      <li><a href="newpage/">new arrivals</a></li>
      <li><a href="newpage/about/sale/">Sale</a></li>
      <li><a href="../">Home</a></li>
    </ul>
    <div class="nav-actions">
      <button>Search</button>
      <button data-bag-count>Bag (0)</button>
    </div>
    <div class="nav-mobile-panel" id="nav-mobile-panel" hidden>
      <ul class="nav-mobile-links">
        <li><a href="#" class="active">Collection</a></li>
        <li><a href="newpage/">new arrivals</a></li>
        <li><a href="newpage/about/sale/">Sale</a></li>
        <li><a href="../">Home</a></li>
      </ul>
      <div class="nav-mobile-actions">
        <button type="button">Search</button>
        <button type="button" data-bag-count>Bag (0)</button>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="collection-hero">
    <div class="hero-text">
      <h1>SS <em>'25</em><br>Collection</h1>
      <p class="hero-sub">Festive / Occasion — Handcrafted Edits</p>
    </div>
    <div class="hero-meta">
      <p>Pieces Available</p>
      <span id="item-count">24</span>
    </div>
  </section>

  <!-- FILTERS -->
  <div class="filters-bar" id="filters-bar">
    <div class="filter-tags" id="filter-tags">
      <button class="filter-tag active" data-filter="all">All</button>
      <button class="filter-tag" data-filter="sets">Sets</button>
      <button class="filter-tag" data-filter="festive">Festive</button>
      <button class="filter-tag" data-filter="dupatta">Dupatta Sets</button>
      <button class="filter-tag" data-filter="coords">Co-ords</button>
      <button class="filter-tag" data-filter="accessories">Accessories</button>
    </div>
    <select class="sort-select" id="sort-select">
      <option value="featured">Sort: Featured</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
      <option value="newest">Newest</option>
    </select>
  </div>

  <!-- GRID -->
  <section class="collection-grid" id="grid">
    <div class="no-results" id="no-results">
      <h3>No pieces found</h3>
      <p>Try a different filter</p>
    </div>
  </section>

  <!-- LOAD MORE -->
  <div class="load-more-wrap">
    <button class="btn-load-more" id="load-more-btn">Load More</button>
  </div>

  <!-- FOOTER -->
  <footer class="footer-strip">
    <p>© 2025 Vell — All rights reserved</p>
    <p>Free delivery on orders over ₹5,000</p>
  </footer>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- ─── SCRIPTS ─── -->
  <script src="index2.js"></script>
</body>

</html>
